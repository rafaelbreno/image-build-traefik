---
name: "Update traefik version" 

sources:
 traefik:
   name: Get traefik version
   kind: githubrelease
   spec:
     owner: traefik
     repository: traefik
     token: '{{ requiredEnv .github.token }}'
     typefilter:
       release: true
       draft: false
       prerelease: false
     versionfilter:
       kind: semver
 
 traefikSrcSha256:
   name: Get traefik source tarball sha256
   kind: shell
   spec:
     command: 'curl -fsSL "https://github.com/traefik/traefik/releases/download/{{ source "traefik" }}/traefik-{{ source "traefik" }}.src.tar.gz" | sha256sum | cut -d'' '' -f1'

targets:
  makefile:
    name: "Bump to latest traefik version in Makefile"
    kind: file
    scmid: default
    disablesourceinput: true
    spec:
      file: Makefile
      matchpattern: '(?m)^TAG \:\= (.*)'
      replacepattern: 'TAG := {{ source "traefik" }}$$(BUILD_META)'

  dockerfileSha:
    name: "Bump traefik source tarball sha256 in Dockerfile"
    kind: file
    scmid: default
    sourceid: traefikSrcSha256
    spec:
      file: Dockerfile
      matchpattern: '(?m)^ARG TRAEFIK_SRC_SHA256="(.*)"'
      replacepattern: 'ARG TRAEFIK_SRC_SHA256="{{ source "traefikSrcSha256" }}"'

scms:
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ .github.username }}'
      user: '{{ .github.username }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      branch: '{{ .github.branch }}'
      
actions:
    default:
        title: 'Bump traefik version to {{ source "traefik" }}'
        kind: github/pullrequest
        spec:
            automerge: false
            labels:
                - chore
                - skip-changelog
                - status/auto-created 
        scmid: default
